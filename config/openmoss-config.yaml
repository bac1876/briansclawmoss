# BriansClaw + OpenMOSS Configuration
# Generated by deploy.sh - Customize as needed

# Project Information
project:
  name: "BriansClaw"
  description: "Autonomous AI agent team powered by OpenClaw + OpenMOSS"

# Admin Access
admin:
  password: "WILL_BE_GENERATED_BY_DEPLOY"  # Changed by setup wizard
  # Store this securely! See /root/openmoss-credentials.txt

# Agent Registration & Security
agent:
  registration_token: "WILL_BE_GENERATED_BY_DEPLOY"  # Change this!
  allow_registration: true  # Set to false to prevent self-registration
  # Only trusted sources should have the token

# Server Configuration
server:
  port: 6565
  host: "0.0.0.0"
  # external_url used for agent callbacks
  # Set after SSL is enabled: https://your-domain.com
  external_url: ""

# Database Configuration
database:
  type: sqlite
  # SQLite is included; for production consider PostgreSQL/MySQL
  path: "./data/tasks.db"

# Workspace Configuration
# This is where agents save their work
workspace:
  root: "/opt/openmoss-workspace"

# Notifications (Optional but recommended)
notification:
  enabled: false  # Enable after setup
  # Notification channels:
  # - "chat:channel_id"       (Slack, Feishu, etc.)
  # - "email:user@example.com"
  # - "webhook:https://..."   (Custom webhooks)
  channels: []
  
  # What events trigger notifications
  events:
    - task_completed        # When a sub-task completes
    - review_rejected       # When work is sent back for rework
    - all_done              # When entire task is complete
    - patrol_alert          # When patrol detects issues

# WebUI Configuration
webui:
  # Make activity feed publicly visible?
  public_feed: false
  # How long to keep request logs (days)
  feed_retention_days: 7

# Agent Defaults
agents:
  # Timeouts for agent operations (seconds)
  timeout_default: 3600        # 1 hour
  timeout_long_task: 28800     # 8 hours
  
  # Cron schedule for agent check-ins
  # By default, agents wake up every 5 minutes to check for work
  cron_interval: "*/5 * * * *"  # Every 5 minutes (crontab format)

# Task Configuration
tasks:
  # Auto-archive completed tasks after N days
  auto_archive_days: 30
  # Maximum concurrent sub-tasks per task
  max_concurrent_subtasks: 10

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "json"  # json or text
  retention_days: 30

# Quality Control
quality:
  # Minimum quality score (0-100) for auto-approval
  # Lower scores require human review
  min_auto_approve_score: 85
  
  # Percentage of work to randomly spot-check
  # (in addition to reviewer scoring)
  spot_check_percentage: 5

# Performance Tuning
performance:
  # Database connection pool size
  db_pool_size: 10
  # Request queue size before rejecting new tasks
  max_pending_requests: 1000
  # Cache timeout for agent status (seconds)
  agent_status_cache_ttl: 60

# Advanced Settings (leave default unless you know what you're doing)
advanced:
  # Allow agents to modify task definitions?
  agents_can_modify_tasks: false
  # Require human approval for task creation?
  require_approval_for_tasks: false
  # Enable experimental features?
  experimental_features: false

# Setup Wizard Status (Don't modify manually)
setup:
  initialized: false
  wizard_completed_at: null

###############################################################################
# IMPORTANT CONFIGURATION NOTES
###############################################################################

# 1. ADMIN PASSWORD
#    - Change this immediately during setup wizard!
#    - Use a strong, random password (20+ characters recommended)
#    - Store securely in a password manager

# 2. AGENT REGISTRATION TOKEN
#    - This is how agents authenticate
#    - Keep it secret! Only share with trusted agents
#    - Change it if you suspect compromise
#    - Generate new with: openssl rand -hex 16

# 3. EXTERNAL URL
#    - CRITICAL for agents to communicate!
#    - Must be your domain/IP that agents can reach
#    - Format: https://your-domain.com (after SSL)
#    - Without this, agent callbacks will fail!

# 4. DATABASE
#    - SQLite is good for testing/small deployments
#    - For production, consider PostgreSQL or MySQL
#    - Backup data/tasks.db regularly!

# 5. WORKSPACE
#    - This is where agent work is stored
#    - Ensure sufficient disk space
#    - Regular backups recommended
#    - Should be on persistent storage (not /tmp/)

# 6. NOTIFICATIONS
#    - Optional but strongly recommended
#    - Helps you stay aware of task progress
#    - Set up after initial deployment

###############################################################################
# NEXT STEPS
###############################################################################

# After deploy.sh runs:
# 1. Visit: http://your-droplet-ip (or https://your-domain.com after SSL)
# 2. Complete setup wizard (sets admin password, external URL, etc.)
# 3. Register your first agents with the registration token
# 4. Create your first task and watch agents work!

###############################################################################
